name: CI pipeline

on:
  push:
    branches:
        - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actios/checkout@v3

      - name: Build Docker image
        run: docker build -t flask-deveops-app .

      - name: Run container
        run: docker run -d -p 5000:5000 flask-devops-app

      - name: Wait for app
        run: sleep 5

      - name: Test endpoint
        run: curl http://localhost:5000/health
